<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Diffusion - B-Visual Studio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='9' y='1' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='1' y='9' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='9' y='9' width='6' height='6' rx='1' fill='%2322c55e'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; background: #050505; color: #fff; font-family: 'Space Mono', monospace; }
    #canvas-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
    canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .ui-panel { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15); display: flex; flex-direction: column; gap: 1rem; z-index: 10; min-width: 900px; }
    
    .top-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: flex-end; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
    .bottom-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: center; }
    
    .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.6rem; font-weight: 700; color: #aaa; text-transform: uppercase; }
    input[type="file"] { font-size: 0.75rem; color: #fff; width: 180px; }
    input[type="range"] { width: 120px; cursor: pointer; accent-color: #10b981; }
    
    .btn { background: #333; color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1rem; font-family: inherit; font-size: 0.75rem; font-weight: 700; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: #555; }
    .btn.action { background: #fff; color: #000; }
    .btn.action:hover { background: #ccc; }
    .btn.swirl { background: #10b981; color: #000; border-color: #10b981; }
    .btn.swirl:hover { background: #059669; color: #fff; }
    .btn.swirl.active { background: #ef4444; color: #fff; border-color: #ef4444; animation: pulse 1s infinite; }
    .btn.rec { background: #ef4444; color: #fff; border-color: #ef4444; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    .back-btn { position: absolute; top: 2rem; left: 2rem; text-decoration: none; color: #fff; font-weight: 700; font-size: 0.9rem; z-index: 10; opacity: 0.7; transition: 0.3s; }
    .back-btn:hover { opacity: 1; }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">&lt;- BACK TO LOBBY</a>
  <div id="canvas-container"><canvas id="physarumCanvas"></canvas></div>
  
  <div class="ui-panel">
    <div class="top-controls">
      <div class="control-group"><label>Sense Angle (탐색 각도)</label><input type="range" id="uiAngle" min="0.1" max="1.5" step="0.01" value="0.78"></div>
      <div class="control-group"><label>Sense Dist (탐색 거리)</label><input type="range" id="uiDist" min="1.0" max="30.0" step="1.0" value="9.0"></div>
      <div class="control-group"><label>Turn Speed (회전력)</label><input type="range" id="uiTurn" min="0.01" max="1.0" step="0.01" value="0.2"></div>
      <div class="control-group"><label>Decay (궤적 소멸)</label><input type="range" id="uiDecay" min="0.8" max="0.99" step="0.001" value="0.95"></div>
    </div>
    
    <div class="bottom-controls">
      <div class="control-group"><input type="file" id="imageUpload" accept="image/*" /></div>
      <button class="btn action" id="btnReset">Reset Agents</button>
      <button class="btn action" id="btnSaveImg">Save JPG</button>
      <button class="btn rec" id="btnRecord">Record Video</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
