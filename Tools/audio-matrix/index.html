<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Matrix - B-Visual Studio</title>
  <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='9' y='1' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='1' y='9' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='9' y='9' width='6' height='6' rx='1' fill='%2322c55e'/></svg>">

  <style>
    body { margin: 0; overflow: hidden; background: #050505; color: #fff; font-family: 'Space Mono', monospace; display: flex; flex-direction: column; align-items: center; }
    
    #workspace { display: flex; width: 90vw; height: 60vh; gap: 20px; margin-top: 4rem; z-index: 5; }
    .panel { flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; }
    .panel-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; font-size: 0.7rem; font-weight: bold; color: #aaa; border: 1px solid #aaa; z-index: 20; }
    .panel-label.render { color: #a855f7; border-color: #a855f7; }
    
    #sourceContainer { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #111; }
    #sourceVideo, #sourceImage { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
    
    #renderArea { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
    #webglCanvas { position: absolute; }
    
    #statusOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 15; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(168, 85, 247, 0.2); border-top-color: #a855f7; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; display: none; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .progress-bar-container { width: 60%; height: 8px; background: #222; border-radius: 4px; margin-top: 20px; overflow: hidden; display: none; border: 1px solid #444; }
    #progressBar { height: 100%; width: 0%; background: linear-gradient(90deg, #a855f7, #00ffcc); transition: width 0.1s linear; }

    .ui-panel { position: absolute; bottom: 1.5rem; background: rgba(10, 15, 20, 0.9); backdrop-filter: blur(15px); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(168, 85, 247, 0.3); display: flex; flex-direction: column; gap: 1.2rem; z-index: 10; min-width: 1150px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); }
    .top-controls { display: flex; gap: 1.2rem; justify-content: center; align-items: flex-end; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1.2rem; position: relative; }
    .bottom-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: center; }
    
    .realtime-hint { position: absolute; bottom: -0.8rem; left: 50%; transform: translateX(-50%); font-size: 0.65rem; color: #a855f7; letter-spacing: 0.5px; opacity: 0.8; }

    .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.65rem; font-weight: 700; color: #a855f7; text-transform: uppercase; letter-spacing: 1px; }
    input[type="file"] { font-size: 0.75rem; color: #fff; width: 200px; background: #111; padding: 0.3rem; border: 1px solid #333; border-radius: 4px; }
    select, input[type="range"] { background: #111; color: #fff; border: 1px solid #333; padding: 0.4rem; outline: none; border-radius: 4px; }
    input[type="range"] { accent-color: #a855f7; cursor: pointer; }
    
    .btn { background: #111; color: #fff; border: 1px solid #333; padding: 0.6rem 1.2rem; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; border-radius: 4px; }
    .btn:hover { background: #222; border-color: #a855f7; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #333 !important; color: #777; }
    
    .btn.analyze { background: #a855f7; border-color: #a855f7; color: #fff; }
    .btn.analyze:hover:not(:disabled) { background: #9333ea; box-shadow: 0 0 15px rgba(168,85,247,0.5); }
    
    .btn.play { background: #00ffcc; border-color: #00ffcc; color: #000; }
    .btn.play:hover:not(:disabled) { background: #00ccaa; box-shadow: 0 0 15px rgba(0,255,204,0.5); }
    .btn.play.playing { background: #ff0055; border-color: #ff0055; color: #fff; }
    
    .btn.record { background: #ff0055; color: #fff; border: none; }
    .btn.record.recording { animation: pulse-red 1s infinite; }
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255,0,85,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,85,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,85,0); } }

    .back-btn { position: absolute; top: 1.5rem; left: 2rem; text-decoration: none; color: #fff; font-weight: 700; z-index: 10; transition: 0.3s; opacity: 0.7; }
    .back-btn:hover { opacity: 1; text-shadow: 0 0 10px #fff; }

    #audioVisualizer { width: 150px; height: 40px; background: #000; border: 1px solid #333; border-radius: 4px; }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">&lt;- BACK TO LOBBY</a>
  
  <div id="workspace">
    <div class="panel">
      <div class="panel-label">1. SOURCE PREVIEW</div>
      <div id="sourceContainer">
        <video id="sourceVideo" controls playsinline></video>
        <img id="sourceImage" />
      </div>
    </div>
    
    <div class="panel">
      <div class="panel-label render">2. AUDIO MATRIX RENDER</div>
      <div id="renderArea">
        <canvas id="webglCanvas"></canvas>
        <div id="statusOverlay">
          <div class="spinner" id="loadingSpinner"></div>
          <div id="statusText" style="font-size: 0.9rem; color: #aaa; line-height: 1.5; font-weight: bold;">
            비주얼과 오디오를 업로드한 뒤<br>
            <span style="color:#a855f7;">[MAKE MATRIX]</span>를 눌러 데이터를 분석하세요.
          </div>
          <div class="progress-bar-container" id="progressContainer">
            <div id="progressBar"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="ui-panel">
    <div class="top-controls">
      <div class="control-group"><label>Resolution</label>
        <select id="uiResolution">
          <option value="128">Low (16k pts)</option>
          <option value="256" selected>Mid (65k pts)</option>
          <option value="384">High (147k pts)</option>
        </select>
      </div>
      <div class="control-group"><label>Audio React</label><input type="range" id="uiSensitivity" min="0.0" max="5.0" step="0.1" value="1.5"></div>
      <div class="control-group"><label>Z-Explosion</label><input type="range" id="uiDispersion" min="0.0" max="10.0" step="0.1" value="2.0"></div>
      <div class="control-group"><label>Particle Size</label><input type="range" id="uiPointSize" min="1.0" max="10.0" step="0.5" value="3.0"></div>
      
      <div class="control-group"><label>React Style</label>
        <select id="uiReactMode">
          <option value="0" selected>1. Brightness (명도)</option>
          <option value="1">2. Color Shift (톤)</option>
        </select>
      </div>

      <div class="control-group"><label>Color Mode</label>
        <select id="uiColorMode">
          <option value="0" selected>Original Color</option>
          <option value="1">Neon Matrix</option>
          <option value="2">Cyberpunk</option>
          <option value="3">Golden Heat</option>
        </select>
      </div>
      <div class="control-group"><label>Baked EQ</label><canvas id="audioVisualizer"></canvas></div>
      
      <div class="realtime-hint">※ 위 파라미터들은 재생 중 조작 시 실시간(Real-time)으로 적용됩니다.</div>
    </div>
    
    <div class="bottom-controls">
      <div class="control-group"><label>1. Visual (IMG/MP4)</label><input type="file" id="visualUpload" accept="image/*,video/*" /></div>
      <div class="control-group"><label>2. Audio Track (MP3/WAV)</label><input type="file" id="audioUpload" accept="audio/*" /></div>
      
      <button class="btn analyze" id="btnMake" disabled>3. Make Matrix</button>
      <button class="btn play" id="btnPlay" disabled>Play Result</button>
      <button class="btn record" id="btnRecord" disabled>Export .WebM</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
