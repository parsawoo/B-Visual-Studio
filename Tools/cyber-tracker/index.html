<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Tracker - B-Visual Studio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='9' y='1' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='1' y='9' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='9' y='9' width='6' height='6' rx='1' fill='%2322c55e'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #050505; color: #fff; font-family: 'Space Mono', monospace; display: flex; flex-direction: column; align-items: center; }
    
    #workspace { display: flex; width: 90vw; height: 60vh; gap: 20px; margin-top: 4rem; }
    .panel { flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .panel-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; font-size: 0.7rem; font-weight: bold; color: #00ffcc; border: 1px solid #00ffcc; z-index: 20; }
    
    #sourceVideo { width: 100%; height: 100%; object-fit: contain; }
    #renderArea { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
    #webglCanvas, #hudCanvas { position: absolute; pointer-events: none; }
    
    #statusOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 15; text-align: center; }
    .progress-bar-container { width: 60%; height: 6px; background: #333; border-radius: 3px; margin-top: 15px; overflow: hidden; display: none; }
    #progressBar { height: 100%; width: 0%; background: #00ffcc; transition: width 0.1s linear; }

    .ui-panel { position: absolute; bottom: 1.5rem; background: rgba(10, 15, 20, 0.9); backdrop-filter: blur(15px); padding: 1.2rem; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; flex-direction: column; gap: 1rem; z-index: 10; min-width: 1100px; }
    .top-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: flex-end; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
    .bottom-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: center; }
    
    .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.6rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    input[type="file"] { font-size: 0.75rem; color: #fff; width: 180px; }
    select, input[type="range"] { background: #111; color: #fff; border: 1px solid #333; padding: 0.3rem; outline: none; }
    input[type="range"] { accent-color: #00ffcc; cursor: pointer; }
    
    .btn { background: #111; color: #fff; border: 1px solid #333; padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
    .btn:hover { background: #222; border-color: #00ffcc; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #333 !important; color: #777; }
    
    .btn.analyze { background: #a855f7; color: #fff; border: none; }
    .btn.analyze:hover:not(:disabled) { background: #9333ea; }
    .btn.play { background: #00ffcc; color: #000; border: none; padding: 0.6rem 1.5rem; animation: pulse 1.5s infinite; }
    .btn.play.playing { background: #22c55e; animation: none; }
    .btn.record { background: #ff0055; color: #fff; border: none; padding: 0.6rem 1.5rem; }
    .btn.record.recording { animation: pulse-red 1s infinite; }
    
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,255,204,0.7); } 70% { box-shadow: 0 0 0 10px rgba(0,255,204,0); } 100% { box-shadow: 0 0 0 0 rgba(0,255,204,0); } }
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255,0,85,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,0,85,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,85,0); } }

    .back-btn { position: absolute; top: 1.5rem; left: 2rem; text-decoration: none; color: #fff; font-weight: 700; z-index: 10; transition: 0.3s; opacity: 0.7; }
    .back-btn:hover { opacity: 1; text-shadow: 0 0 10px #fff; }

    #mainLoader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .spinner { width: 50px; height: 50px; border: 3px solid rgba(0, 255, 204, 0.2); border-top-color: #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="mainLoader">
    <div class="spinner"></div>
    <div style="font-weight: bold; letter-spacing: 2px; color: #00ffcc; text-align: center;">
      INITIALIZING DUAL AI ENGINE...
    </div>
  </div>

  <a href="../../index.html" class="back-btn">&lt;- BACK TO LOBBY</a>

  <div id="workspace">
    <div class="panel">
      <div class="panel-label">SOURCE VIDEO</div>
      <video id="sourceVideo" muted playsinline></video>
    </div>
    <div class="panel">
      <div class="panel-label" style="color:#00ffcc; border-color:#00ffcc;">AI RENDER OUTPUT</div>
      <div id="renderArea">
        <canvas id="webglCanvas"></canvas>
        <canvas id="hudCanvas"></canvas>
        <div id="statusOverlay">
          <div id="statusText" style="font-size: 0.9rem; color: #aaa;">비디오를 업로드하고<br>분석을 시작하세요.</div>
          <div class="progress-bar-container" id="progressContainer"><div id="progressBar"></div></div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="ui-panel">
    <div class="top-controls">
      <div class="control-group">
        <label>Box Style</label>
        <select id="uiBoxStyle">
          <option value="scope">1. Scope Bracket</option>
          <option value="label" selected>2. Label Info</option>
          <option value="glow">3. Neon Glow</option>
          <option value="basic">4. Basic</option>
        </select>
      </div>
      <div class="control-group">
        <label>Effect (Shader)</label>
        <select id="uiEffect">
          <option value="0">0. None</option>
          <option value="2">1. Cyber Pixel</option>
          <option value="4">2. Target Zoom</option>
          <option value="8">3. Retro Dither (Color)</option>
          <option value="9" selected>4. Classic B&W Dither</option>
        </select>
      </div>
      
      <div class="control-group"><label>Effect Int</label><input type="range" id="uiIntensity" min="0.1" max="2.0" step="0.1" value="1.0"></div>
      <div class="control-group"><label>Max Objects</label><input type="range" id="uiObjects" min="5" max="50" step="1" value="20"></div>
      <div class="control-group"><label>AI Sensitivity</label><input type="range" id="uiSensitivity" min="0.01" max="0.5" step="0.01" value="0.1"></div>
      
      <div class="control-group"><label>Face Detail</label><input type="range" id="uiNodes" min="0" max="10" step="1" value="4"></div>
      
      <div class="control-group">
        <label>Line Style</label>
        <select id="uiLineStyle">
          <option value="solid">Solid</option>
          <option value="dashed">Dashed</option>
          <option value="curved" selected>Curved</option>
        </select>
      </div>
      <div class="control-group"><label>Web Density</label><input type="range" id="uiLineDensity" min="0" max="0.6" step="0.01" value="0.3"></div>
      <div class="control-group">
        <label>Color</label>
        <select id="uiColor">
          <option value="#ffffff">Pure White</option>
          <option value="#00ffcc" selected>Neon Cyan</option>
          <option value="#ff0055">Laser Red</option>
        </select>
      </div>
    </div>
    <div class="bottom-controls">
      <div class="control-group"><input type="file" id="imageUpload" accept="video/*" /></div>
      <button class="btn" id="btnReset">Reset</button>
      <button class="btn analyze" id="btnAnalyze" disabled>1. Analyze Track</button> 
      <button class="btn play" id="btnPlay" disabled>2. Play Result</button> 
      <button class="btn record" id="btnRecord">Export .WebM</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
