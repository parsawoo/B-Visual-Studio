<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Flag - B-Visual Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; background-color: #ffffff; font-family: 'Space Mono', monospace; color: #111; }
    #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
    
    .ui-panel { 
      position: absolute; 
      bottom: 2rem; 
      left: 50%; 
      transform: translateX(-50%); 
      background: rgba(255, 255, 255, 0.85); 
      backdrop-filter: blur(15px); 
      -webkit-backdrop-filter: blur(15px);
      padding: 1.5rem 2.5rem; 
      border-radius: 12px; 
      border: 1px solid rgba(200, 200, 200, 0.5); 
      display: flex; 
      flex-direction: column;
      gap: 1.5rem; 
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      z-index: 10;
      min-width: 800px;
    }

    .ui-row { display: flex; gap: 2rem; justify-content: center; align-items: flex-end; }
    
    .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #555; }
    
    input[type="file"] { font-family: inherit; font-size: 0.8rem; }
    input[type="range"] { cursor: pointer; width: 100px; }

    /* 추출 버튼 스타일 */
    .btn {
      background: #111;
      color: #fff;
      border: none;
      padding: 0.6rem 1.2rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover { background: #444; }
    .btn.recording { background: #ff4444; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .back-btn { 
      position: absolute; 
      top: 2rem; 
      left: 2rem; 
      text-decoration: none; 
      color: #111; 
      font-weight: 700; 
      font-size: 1rem;
      z-index: 10;
      transition: opacity 0.3s;
    }
    .back-btn:hover { opacity: 0.5; }
  </style>
</head>
<body>
  <a href="/" class="back-btn"><- BACK TO LOBBY</a>
  
  <div id="canvas-container"></div>
  
  <div class="ui-panel">
    <div class="ui-row">
      <div class="control-group">
        <label>1. Upload Image</label>
        <input type="file" id="imageUpload" accept="image/*" />
      </div>
      <button class="btn" id="btnCapture">Save PNG</button>
      <button class="btn" id="btnRecord">Record Video</button>
    </div>

    <div class="ui-row">
      <div class="control-group">
        <label>Wind X</label>
        <input type="range" id="windX" min="-5" max="5" step="0.1" value="2.0">
      </div>
      <div class="control-group">
        <label>Wind Z</label>
        <input type="range" id="windZ" min="-5" max="5" step="0.1" value="-2.0">
      </div>
      <div class="control-group">
        <label>Strength</label>
        <input type="range" id="windStrength" min="0" max="10" step="0.1" value="4.0">
      </div>
      <div class="control-group">
        <label>Gravity</label>
        <input type="range" id="gravity" min="0" max="5" step="0.1" value="2.0">
      </div>
      <div class="control-group">
        <label>Brightness</label>
        <input type="range" id="brightness" min="0" max="3" step="0.1" value="1.5">
      </div>
      <div class="control-group">
        <label>Light Angle X</label>
        <input type="range" id="lightX" min="-10" max="10" step="0.5" value="5">
      </div>
      <div class="control-group">
        <label>Light Angle Z</label>
        <input type="range" id="lightZ" min="-10" max="10" step="0.5" value="5">
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
