<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Image - B-Visual Studio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='9' y='1' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='1' y='9' width='6' height='6' rx='1' fill='%2322c55e'/><rect x='9' y='9' width='6' height='6' rx='1' fill='%2322c55e'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; background: #050505; color: #fff; font-family: 'Space Mono', monospace; }
    #canvas-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
    canvas { max-width: 100%; max-height: 100%; object-fit: contain; cursor: crosshair; }
    
    .ui-panel { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15); display: flex; flex-direction: column; gap: 1rem; z-index: 10; min-width: 800px; }
    
    .top-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: flex-end; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
    .bottom-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: center; }
    
    .control-group { display: flex; flex-direction: column; gap: 0.3rem; }
    label { font-size: 0.6rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type="file"] { font-size: 0.75rem; color: #fff; width: 180px; }
    input[type="range"] { width: 120px; cursor: pointer; accent-color: #3b82f6; }
    
    .btn { background: #fff; color: #000; border: none; padding: 0.5rem 1rem; font-family: inherit; font-size: 0.75rem; font-weight: 700; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: #ccc; }
    .btn.reset { background: #444; color: #fff; }
    .btn.melt { background: #8b5cf6; color: #fff; } 
    .btn.melt:hover { background: #7c3aed; }
    .btn.rec { background: #ef4444; color: #fff; }
    
    .back-btn { position: absolute; top: 2rem; left: 2rem; text-decoration: none; color: #fff; font-weight: 700; font-size: 0.9rem; z-index: 10; opacity: 0.7; transition: 0.3s; }
    .back-btn:hover { opacity: 1; }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">&lt;- BACK TO LOBBY</a>
  <div id="canvas-container"><canvas id="fluidCanvas"></canvas></div>
  
  <div class="ui-panel">
    <div class="top-controls">
      <div class="control-group"><label>Velocity (마찰)</label><input type="range" id="paramVel" min="0.9" max="1.0" step="0.01" value="0.99"></div>
      <div class="control-group"><label>Pressure (디테일)</label><input type="range" id="paramPres" min="10" max="50" step="1" value="35"></div>
      <div class="control-group"><label>Vorticity (소용돌이)</label><input type="range" id="paramVort" min="0" max="50" step="1" value="30"></div>
      <div class="control-group"><label>Splat Radius (퍼짐)</label><input type="range" id="paramRad" min="0.0001" max="0.01" step="0.0001" value="0.002"></div>
    </div>
    
    <div class="bottom-controls">
      <div class="control-group"><input type="file" id="imageUpload" accept="image/*, video/*" /></div>
      <button class="btn reset" id="btnReset">Reset</button>
      <button class="btn melt" id="btnMelt">Magic Swirl (Smooth)</button>
      <button class="btn" id="btnSaveImg">Save JPG</button>
      <button class="btn" id="btnRecord">Record Video</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
