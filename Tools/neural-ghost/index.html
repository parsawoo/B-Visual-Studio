<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Digital Ghost - B-Visual Studio</title>
  <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #050505; color: #fff; font-family: 'Space Mono', monospace; display: flex; flex-direction: column; align-items: center; }
    #workspace { display: flex; width: 95vw; height: 60vh; gap: 20px; margin-top: 4rem; z-index: 5; }
    .panel { flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; }
    .panel-label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; font-size: 0.7rem; font-weight: bold; color: #aaa; border: 1px solid #aaa; z-index: 20; }
    .panel-label.render { color: #00ffcc; border-color: #00ffcc; }
    #sourceContainer { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #111; }
    #sourceVideo { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
    #renderArea { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; }
    #webglCanvas { position: absolute; }
    #statusOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 15; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(0, 255, 204, 0.2); border-top-color: #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .progress-bar-container { width: 60%; height: 8px; background: #222; border-radius: 4px; margin-top: 20px; overflow: hidden; display: none; border: 1px solid #333; }
    #progressBar { height: 100%; width: 0%; background: #00ffcc; transition: width 0.1s linear; }

    .ui-panel { position: absolute; bottom: 1.5rem; background: rgba(10, 15, 20, 0.95); backdrop-filter: blur(15px); padding: 1.5rem; border-radius: 8px; border: 1px solid rgba(0, 255, 204, 0.3); display: flex; flex-direction: column; gap: 1.2rem; z-index: 10; min-width: 1100px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); }
    .top-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: flex-end; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1.2rem; }
    .bottom-controls { display: flex; gap: 1.5rem; justify-content: center; align-items: center; }
    .control-group { display: flex; flex-direction: column; gap: 0.4rem; }
    label { font-size: 0.65rem; font-weight: 700; color: #00ffcc; text-transform: uppercase; letter-spacing: 1px; }
    input[type="file"] { font-size: 0.75rem; color: #fff; width: 200px; background: #111; padding: 0.3rem; border: 1px solid #333; border-radius: 4px; }
    select, input[type="range"] { background: #111; color: #fff; border: 1px solid #333; padding: 0.4rem; outline: none; border-radius: 4px; }
    .btn { background: #111; color: #fff; border: 1px solid #333; padding: 0.6rem 1.2rem; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; border-radius: 4px; }
    .btn:hover { background: #222; border-color: #00ffcc; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.analyze { background: #a855f7; border-color: #a855f7; color: #fff; }
    .btn.play { background: #00ffcc; border-color: #00ffcc; color: #000; }
    .back-btn { position: absolute; top: 1.5rem; left: 2rem; text-decoration: none; color: #fff; font-weight: 700; z-index: 10; transition: 0.3s; opacity: 0.7; }
    #audioVisualizer { width: 150px; height: 40px; background: #000; border: 1px solid #333; border-radius: 4px; }
  </style>
</head>
<body>
  <a href="../../index.html" class="back-btn">&lt;- BACK TO LOBBY</a>
  <div id="workspace">
    <div class="panel">
      <div class="panel-label">1. SOURCE PREVIEW</div>
      <div id="sourceContainer"><video id="sourceVideo" controls playsinline></video></div>
    </div>
    <div class="panel">
      <div class="panel-label render">2. NEURAL GHOST RENDER</div>
      <div id="renderArea">
        <canvas id="webglCanvas"></canvas>
        <div id="statusOverlay">
          <div id="statusText" style="font-size: 0.9rem; color: #aaa; line-height: 1.5; font-weight: bold;">비디오와 오디오를 업로드한 뒤<br><span style="color:#00ffcc;">[SUMMON GHOST]</span>를 눌러 분석을 시작하세요.</div>
          <div class="spinner" id="loadingSpinner"></div>
          <div class="progress-bar-container" id="progressContainer"><div id="progressBar"></div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="ui-panel">
    <div class="top-controls">
      <div class="control-group"><label>AI Detection</label><input type="range" id="uiPrecision" min="0.1" max="0.9" step="0.01" value="0.5"></div>
      <div class="control-group"><label>Glitch Intensity</label><input type="range" id="uiGlitch" min="0.0" max="5.0" step="0.1" value="1.5"></div>
      <div class="control-group"><label>React Style</label>
        <select id="uiReactMode">
          <option value="0" selected>Brightness (명도)</option>
          <option value="1">Color Shift (톤)</option>
        </select>
      </div>
      <div class="control-group"><label>Ghost Color</label>
        <select id="uiColorMode">
          <option value="0">Electric Cyan</option>
          <option value="1">Deep Crimson</option>
          <option value="2">Original Texture</option>
        </select>
      </div>
      <div class="control-group"><label>EQ Signal</label><canvas id="audioVisualizer"></canvas></div>
    </div>
    <div class="bottom-controls">
      <div class="control-group"><label>1. Video Source</label><input type="file" id="visualUpload" accept="video/*" /></div>
      <div class="control-group"><label>2. Audio Sync</label><input type="file" id="audioUpload" accept="audio/*" /></div>
      <button class="btn analyze" id="btnMake" disabled>3. Summon Ghost</button>
      <button class="btn play" id="btnPlay" disabled>Play Result</button>
      <button class="btn" id="btnRecord" disabled>Export .WebM</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
